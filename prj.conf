CONFIG_NCS_SAMPLES_DEFAULTS=y

CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_ATT_TX_COUNT=5
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_DM=y
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_BT_HOGP=y

CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_UUID_CNT=1
CONFIG_BT_PRIVACY=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

CONFIG_DK_LIBRARY=y

CONFIG_USB_DEVICE_STACK=n
# Enable the New USB Device Stack
CONFIG_USB_DEVICE_STACK_NEXT=y

# Enable HID Class for the New Stack
CONFIG_USB_DEVICE_HID=y

# Set USB Log levels to Debug (this is the key!)
CONFIG_USB_DEVICE_LOG_LEVEL_DBG=y
CONFIG_USBD_LOG_LEVEL_DBG=y
CONFIG_USB_DRIVER_LOG_LEVEL_DBG=y

# Increase log buffer size so messages don't get dropped
CONFIG_LOG_BUFFER_SIZE=4096

# Set the maximum number of simultaneous connections
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

# Increase the total number of HOGP instances (one per connection)
#CONFIG_BT_HOGP_MAX_INSTANCES=5
# Increase the total number of report structures across ALL instances
# If a typical mouse/keyboard has 3-5 reports, set this to at least 10-15
CONFIG_BT_HOGP_REPORTS_MAX=25

# This is often the culprit for the slab assertion:
# Increase the GATT Discovery Manager's internal attribute count
# so it can parse multiple services/characteristics at once.
CONFIG_BT_GATT_DM_MAX_ATTRS=50

CONFIG_BT_BUF_CMD_TX_COUNT=10
CONFIG_BT_BUF_EVT_RX_COUNT=10

CONFIG_BT_LOG_LEVEL_INF=y

CONFIG_BT_HCI_TX_STACK_SIZE=4096

CONFIG_BT_RX_STACK_SIZE=4096

CONFIG_FAULT_DUMP=2
CONFIG_RESET_ON_FATAL_ERROR=n

CONFIG_BT_CTLR_ASSERT_HANDLER=y


CONFIG_BT_PERIPHERAL_PREF_MIN_INT=25
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40

# Prevent the device from forcing a 7.5ms interval automatically
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n

CONFIG_BT_HCI_ACL_FLOW_CONTROL=y

CONFIG_UDC_BUF_POOL_SIZE=20000

